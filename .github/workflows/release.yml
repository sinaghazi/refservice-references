name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish plugin zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version consistency check
        run: bin/check-version.sh "${GITHUB_REF_NAME#v}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer

      - name: PHP syntax check
        run: find . -name '*.php' -not -path './vendor/*' -exec php -l {} +

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP_CodeSniffer
        run: vendor/bin/phpcs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JavaScript syntax check
        run: |
          set -e
          for file in assets/js/*.js; do
            echo "Checking $file"
            node --check "$file"
          done

      # Allowlist build: only runtime files ship. Top-level folder must be
      # exactly refservice-references/ so WordPress upgrades in place.
      - name: Build plugin zip
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE=build/refservice-references
          mkdir -p "$STAGE"
          cp refservice-references.php uninstall.php readme.txt "$STAGE/"
          cp -R includes assets templates languages "$STAGE/"
          (cd build && zip -rq refservice-references.zip refservice-references)
          cp build/refservice-references.zip "build/refservice-references-${VERSION}.zip"
          unzip -l build/refservice-references.zip

      - name: Extract changelog for release notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 == "= " ver " =" { flag = 1; next }
            /^= / && flag { exit }
            flag { print }
          ' readme.txt | sed '/./,$!d' > build/release-notes.md
          if ! grep -q '[^[:space:]]' build/release-notes.md; then
            echo "No changelog entry found for $VERSION in readme.txt" >&2
            exit 1
          fi
          cat build/release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "build/refservice-references.zip" \
            "build/refservice-references-${GITHUB_REF_NAME#v}.zip" \
            --title "$GITHUB_REF_NAME" \
            --notes-file build/release-notes.md
